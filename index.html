<!DOCTYPE html>
<html>
<head>
<title>Class 8 Elite Chat</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
</head>

<body>

<div id="loginDiv">
<h2>Login</h2>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<input type="file" id="profilePic"><br>
<button onclick="register()">Register</button>
<button onclick="loginUser()">Login</button>
<p id="errorMsg" style="color:red;"></p>
</div>

<div id="chatDiv" style="display:none;">
<div class="container">

<div class="sidebar">
<h3 onclick="switchRoom('home')">🏠 Home</h3>
<h3 onclick="switchRoom('classwork')">📚 Classwork</h3>
<h3 onclick="switchRoom('doubts')">❓ Study Doubts</h3>
<h3 onclick="switchRoom('memes')">😂 Memes</h3>
<h3 onclick="switchRoom('gamer')">🎮 Gamer</h3>
<button onclick="logout()">Logout</button>
</div>

<div class="main">
<h2 id="roomTitle">HOME</h2>
<div id="messages" class="messages"></div>
<input id="msgInput" placeholder="Type message">
<button onclick="sendMessage()">Send</button>
</div>

<div class="people">
<h4>Online</h4>
<div id="usersList"></div>
</div>

</div>
</div>

<script src="app.js"></script>
</body>
</html>
