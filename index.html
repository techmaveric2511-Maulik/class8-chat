<!DOCTYPE html>
<html>
<head>
  <title>Class 8 Discord Firebase</title>
  <style>
    body { margin:0; font-family:Arial; background:#36393f; color:white;}
    .container { display:flex; height:100vh;}
    .sidebar { width:200px; background:#2f3136; padding:15px;}
    .main { flex:1; padding:20px;}
    .people { width:200px; background:#202225; padding:10px;}
    input { padding:8px; margin:5px;}
    button { padding:8px; background:#5865f2; color:white; border:none; cursor:pointer;}
    .green-dot { height:8px; width:8px; background:#43b581; border-radius:50%; display:inline-block;}
  </style>
</head>
<body>

<div id="loginDiv">
  <h2>Class 8 Login</h2>
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="register()">Register</button>
  <button onclick="loginUser()">Login</button>
  <p id="errorMsg" style="color:red;"></p>
</div>

<div id="chatDiv" style="display:none;">
  <div class="container">
    <div class="sidebar">
      <h3>Home</h3>
      <h3>Classwork</h3>
      <h3>Study Doubts</h3>
      <h3>Memes</h3>
      <h3>Gamer Page</h3>
      <button onclick="logout()">Logout</button>
    </div>

    <div class="main">
      <div id="messages"></div>
      <input id="msgInput" placeholder="Type message">
      <button onclick="sendMessage()">Send</button>
    </div>

    <div class="people">
      <h4>Online Users</h4>
      <div id="usersList"></div>
    </div>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  signInWithEmailAndPassword, 
  onAuthStateChanged,
  signOut 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { 
  getFirestore, 
  collection, 
  addDoc, 
  onSnapshot, 
  query, 
  orderBy,
  setDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
const firebaseConfig = {
  apiKey: "AIzaSyArbnk6rVI_wRPQibYx1DRKUlEJr19JQ_w",
  authDomain: "class8-discord-acfcf.firebaseapp.com",
  projectId: "class8-discord-acfcf",
  storageBucket: "class8-discord-acfcf.firebasestorage.app",
  messagingSenderId: "1017298929493",
  appId: "1:1017298929493:web:15c30c79b46a020dbbd1dc",
  measurementId: "G-XEVRSZVM66"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const loginDiv = document.getElementById("loginDiv");
const chatDiv = document.getElementById("chatDiv");
const errorMsg = document.getElementById("errorMsg");

window.register = async function() {
  try {
    await createUserWithEmailAndPassword(
      auth,
      email.value,
      password.value
    );
  } catch (error) {
    errorMsg.innerText = error.message;
  }
};

window.loginUser = async function() {
  try {
    await signInWithEmailAndPassword(
      auth,
      email.value,
      password.value
    );
  } catch (error) {
    errorMsg.innerText = error.message;
  }
};

window.logout = async function() {
  await signOut(auth);
};

onAuthStateChanged(auth, async (user) => {
  if (user) {
    loginDiv.style.display = "none";
    chatDiv.style.display = "block";

    await setDoc(doc(db, "onlineUsers", user.uid), {
      email: user.email
    });

    const messagesRef = collection(db, "messages");
    const q = query(messagesRef, orderBy("time"));

    onSnapshot(q, (snapshot) => {
      messages.innerHTML = "";
      snapshot.forEach((doc) => {
        messages.innerHTML += "<p>" + doc.data().text + "</p>";
      });
    });

    onSnapshot(collection(db, "onlineUsers"), (snapshot) => {
      usersList.innerHTML = "";
      snapshot.forEach((doc) => {
        usersList.innerHTML += 
          "<div>" + doc.data().email + 
          " <span class='green-dot'></span></div>";
      });
    });

  } else {
    loginDiv.style.display = "block";
    chatDiv.style.display = "none";
  }
});

window.sendMessage = async function() {
  if(msgInput.value === "") return;

  await addDoc(collection(db, "messages"), {
    text: auth.currentUser.email + ": " + msgInput.value,
    time: Date.now()
  });

  msgInput.value = "";
};

</script>

</body>
</html>
