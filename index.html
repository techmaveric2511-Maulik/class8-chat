<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy Chat</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🌠 Starfield Background -->
<canvas id="stars"></canvas>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h3 onclick="switchRoom('home')">Home</h3>
    <h3 onclick="switchRoom('general')">General</h3>
    <h3 onclick="switchRoom('random')">Random</h3>
    <button onclick="openDM()">Private DM</button>
  </div>

  <!-- Main Chat -->
  <div class="main">
    <div class="chat-header" id="roomTitle">HOME</div>
    <div class="messages" id="messages"></div>

    <div class="input-area">
      <input type="text" id="msgInput" placeholder="Type a message...">
      <!-- Emoji buttons -->
      <button onclick="addEmoji('😎')">😎</button>
      <button onclick="addEmoji('🔥')">🔥</button>
      <button onclick="addEmoji('💀')">💀</button>
      <button onclick="sendMessage()">Send</button>
      <button onclick="recordVoice()">🎤</button>
    </div>
  </div>

  <!-- People Online -->
  <div class="people">
    <h3>Online Users (<span id="userCount">0</span>)</h3>
    <div id="usersList"></div>
  </div>

</div>

<audio id="notifSound" src="notif.mp3"></audio>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="app.js"></script>
</body>
</html>
