<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<h2>🔥 Admin Dashboard</h2>

<div id="loginDiv">
  <input type="email" id="adminEmail" placeholder="Admin Email">
  <input type="password" id="adminPassword" placeholder="Password">
  <button onclick="loginAdmin()">Login</button>
</div>

<div id="adminContent" style="display:none;">
  <h3>Platform Stats</h3>
  <p>Total Users: <span id="totalUsers">0</span></p>
  <p>Total Messages: <span id="totalMessages">0</span></p>
  <p>Online Users: <span id="onlineUsersCount">0</span></p>

  <hr>

  <h3>Online Users</h3>
  <div id="onlineUsersList"></div>

  <hr>

  <h3>All Messages (Realtime)</h3>
  <div id="allMessages" style="max-height:400px;overflow:auto;border:1px solid #fff;padding:10px;"></div>

  <hr>

  <h3>Ban a User</h3>
  <input type="email" id="banEmail" placeholder="Email to ban">
  <button onclick="banUser()">Ban User</button>

  <hr>

  <button onclick="logoutAdmin()">Logout</button>
</div>

<p id="loginError" style="color:red;"></p>

<script src="admin.js"></script>
</body>
</html>
